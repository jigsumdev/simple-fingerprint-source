name = "precision-scanner"
compatibility_date = "2025-04-01"
main = "src/worker.ts"

[assets]
directory = "./dist"
not_found_handling = "single-page-application"

[[d1_databases]]
binding = "DB"
database_name = "precision-scanner-db"
database_id = "LOCAL_DEV_PLACEHOLDER"
migrations_dir = "migrations"

[triggers]
crons = ["0 3 * * *"]
